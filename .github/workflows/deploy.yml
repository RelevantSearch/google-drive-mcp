name: CI and Deploy

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  PROJECT_ID: rs-workspace-integrations
  REGION: us-central1
  SERVICE: drive-mcp
  REPO: drive-mcp
  WIF_PROVIDER: projects/547220269732/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOY_SA: drive-mcp-deployer@rs-workspace-integrations.iam.gserviceaccount.com

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The Dockerfile copies a pre-built `dist/` — `src/` + `scripts/` are
      # `.dockerignore`-excluded and `dist/` is gitignored, so we must compile
      # TypeScript on the runner before `docker build`.
      - name: Install and build
        # `npm ci`'s `prepare` lifecycle hook is defined as `npm run build` in
        # package.json, so `--ignore-scripts` keeps the build explicit (and
        # single) rather than running twice.
        run: |
          npm ci --ignore-scripts
          npm run build

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        id: build
        run: |
          TAG="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${SERVICE}:${COMMIT_SHA}"
          docker build -t "$TAG" .
          docker push "$TAG"
          echo "image=$TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        env:
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          gcloud run deploy "${SERVICE}" \
            --image="${IMAGE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --quiet
